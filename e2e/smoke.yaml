# Maestro smoke — run with EN locale; credentials via env vars.
# Example: MAESTRO_USERNAME=cashier MAESTRO_PASSWORD=secret maestro test e2e/smoke.yaml
appId: com.smartaccounting.mobile
---
- launchApp
- tapOn:
    id: auth.username
- inputText: "${MAESTRO_USERNAME}"
- tapOn:
    id: auth.password
- inputText: "${MAESTRO_PASSWORD}"
- tapOn:
    id: auth.sign-in
- tapOn: "Till"
- tapOn:
    id: till.open-float
- inputText: "50000"
- tapOn:
    id: till.open-submit
- tapOn: "POS"
- tapOn:
    id: checkout.barcode
- inputText: "TEST-SKU-001"
- tapOn:
    id: checkout.add
- tapOn:
    id: checkout.tender-cash
- tapOn:
    id: checkout.complete-sale
- tapOn:
    id: receipt.print
- tapOn: "Till"
- tapOn:
    id: till.close-nav
- tapOn:
    id: till.close-submit
