services:
  - type: web
    name: smartaccounting-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /actuator/health/readiness
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: READINESS_HEALTH_COMPONENTS
        value: db,redis
      - key: DB_HOST
        fromDatabase:
          name: smartaccounting-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: smartaccounting-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: smartaccounting-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: smartaccounting-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: smartaccounting-db
          property: password
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: smartaccounting-redis
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: smartaccounting-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: smartaccounting-redis
          property: port
      - key: JWT_SECRET
        sync: false
      - key: JWT_KEY_ID
        value: smartaccounting-k1
      - key: CORS_ALLOWED_ORIGINS
        value: https://smartaccounting-web.onrender.com
      - key: SMARTACCOUNTING_OAUTH2_REDIRECT_URI
        value: https://smartaccounting-web.onrender.com/auth/oauth2/callback
      - key: SMARTACCOUNTING_AI_FAIL_ON_MISSING_PROVIDER_KEYS
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MOBILE_MONEY_MTN_WEBHOOK_SECRET
        sync: false
      - key: MOBILE_MONEY_AIRTEL_WEBHOOK_SECRET
        sync: false
      - key: SMS_ENABLED
        value: "false"
      - key: WHATSAPP_ENABLED
        value: "false"
      - key: MOMO_STK_ENABLED
        value: "false"

  - type: web
    name: smartaccounting-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://smartaccounting-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: keyvalue
    name: smartaccounting-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow Render service access

databases:
  - name: smartaccounting-db
    plan: free
    region: frankfurt
