# Shared test defaults (no datasource: integration tests activate profile "it" + @ServiceConnection PostgreSQL).
spring:
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379

smartaccounting:
  cors:
    allowed-origins: http://localhost:5173
  ai:
    fail-on-missing-provider-keys: false
    embedding:
      provider: placeholder
      model: text-embedding-3-small
      api-key: ""
      dimensions: 1536
    completion:
      provider: placeholder
      model: claude-sonnet-4-20250514
      api-key: ""
      max-tokens: 1000
  pos:
    default-inventory-location: SHOP
    sale-sink-location: SOLD
    allow-negative-stock: false
    business-time-zone: Africa/Kigali
  kafka:
    enabled: false
  sms:
    enabled: false
    dry-run: true
  receipt:
    store-name: SMARTACCOUNTING TEST
    store-address: Kigali
    footer-text: Thank you.
    printer-type: thermal
  label:
    printer-type: thermal-label
  security:
    jwt-secret: test-secret-key-for-jwt-signing-32-bytes-minimum
    jwt-expiration-minutes: 120
    refresh-expiration-days: 14
