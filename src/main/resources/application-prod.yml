# Production profile — activate with spring.profiles.active=prod

spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  data:
    redis:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms
        shutdown-timeout: 100ms

management:
  endpoint:
    health:
      show-details: when-authorized

smartaccounting:
  auth:
    demo-fallback-enabled: false
    jwt:
      access-token-expiry-seconds: 900
      refresh-token-expiry-seconds: 604800
      rotation-on-refresh: true
      revocation-store: redis
  ai:
    fail-on-missing-provider-keys: ${SMARTACCOUNTING_AI_FAIL_ON_MISSING_PROVIDER_KEYS:true}
    embedding:
      provider: openai
      model: text-embedding-3-small
      api-key: ${OPENAI_API_KEY}
      dimensions: 1536
    completion:
      provider: anthropic
      model: claude-sonnet-4-20250514
      api-key: ${ANTHROPIC_API_KEY}
      max-tokens: 1000
  copilot:
    agent:
      policy:
        default-dry-run: false
        action-requires-approval: true
  mobile-money:
    mtn-webhook-secret: ${MOBILE_MONEY_MTN_WEBHOOK_SECRET}
    airtel-webhook-secret: ${MOBILE_MONEY_AIRTEL_WEBHOOK_SECRET}
    mtn-allowed-ips: ${MOMO_ALLOWED_IPS:}
    verify-enabled: ${MOMO_VERIFY_ENABLED:false}
    mtn-verify-url: ${MOMO_MTN_VERIFY_URL:}
    verify-bearer-token: ${MOMO_VERIFY_BEARER_TOKEN:}
    stk-enabled: ${MOMO_STK_ENABLED:false}
    stk-base-url: ${MOMO_STK_BASE_URL:https://proxy.momoapi.mtn.com}
    stk-subscription-key: ${MOMO_SUBSCRIPTION_KEY:}
    stk-api-user: ${MOMO_API_USER:}
    stk-api-key: ${MOMO_API_KEY:}
    stk-target-environment: ${MOMO_ENVIRONMENT:production}
    stk-callback-url: ${MOMO_CALLBACK_URL:}
  whatsapp:
    enabled: ${WHATSAPP_ENABLED:false}
    dry-run: ${WHATSAPP_DRY_RUN:true}
    api-url: ${WHATSAPP_API_URL:https://graph.facebook.com/v18.0}
    bearer-token: ${WHATSAPP_API_TOKEN:}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    template-name: ${WHATSAPP_TEMPLATE_NAME:smartaccounting_receipt}
    use-template: ${WHATSAPP_USE_TEMPLATE:false}
  sms:
    enabled: true
    dry-run: false
    provider-url: ${SMS_PROVIDER_URL}
    bearer-token: ${SMS_BEARER_TOKEN}
    sender-id: ${SMS_SENDER_ID}
  forecast:
    base-url: ${FORECAST_BASE_URL}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: Authorization,Content-Type,X-Tenant-ID,Idempotency-Key
    max-age: 3600

logging:
  pattern:
    console: '{"ts":"%d{ISO8601}","level":"%p","logger":"%logger{36}","tenant":"%X{tenantId}","traceId":"%X{traceId}","msg":"%msg"}%n'
  level:
    root: WARN
    com.smartaccounting: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
