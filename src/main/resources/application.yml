server:
  port: ${PORT:8080}

spring:
  application:
    name: smartaccounting-backend
  datasource:
    url: "${DB_URL:${JDBC_DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:smartchain}}}"
    username: ${DB_USERNAME:smartchain}
    password: ${DB_PASSWORD:smartchain}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:30}
      minimum-idle: ${DB_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      properties:
        enable.idempotence: true
    consumer:
      group-id: ${KAFKA_GROUP_ID:smartaccounting-backend}
      auto-offset-reset: earliest
  data:
    redis:
      url: ${REDIS_URL:}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: ${READINESS_HEALTH_COMPONENTS:db,redis,rls,forecast}
        liveness:
          include: ping
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      enabled: ${OTEL_EXPORTER_OTLP_ENABLED:false}
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "corr=%X{correlationId:-na} tenant=%X{tenantId:-na} user=%X{userId:-na} %5p"

smartchain:
  fcm:
    service-account-path: ${FCM_SERVICE_ACCOUNT_PATH:}

smartaccounting:
  auth:
    demo-fallback-enabled: ${SMARTACCOUNTING_AUTH_DEMO_FALLBACK:true}
  oauth2:
    redirect-uri: ${SMARTACCOUNTING_OAUTH2_REDIRECT_URI:http://localhost:5173/auth/oauth2/callback}
  cors:
    # Comma-separated origins, or patterns containing * (see CorsConfig). Default uses patterns so any
    # localhost / 127.0.0.1 dev port (e.g. Vite 5173–5176) works without editing env when CORS_ALLOWED_ORIGINS is unset.
    allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}"
  api:
    v1-deprecation-enabled: ${API_V1_DEPRECATION_ENABLED:false}
    v1-sunset: ${API_V1_SUNSET:Wed, 31 Dec 2026 23:59:59 GMT}
  ai:
    fail-on-missing-provider-keys: ${SMARTACCOUNTING_AI_FAIL_ON_MISSING_PROVIDER_KEYS:false}
    embedding:
      provider: openai
      model: text-embedding-3-small
      api-key: ${OPENAI_API_KEY:}
      dimensions: 1536
    completion:
      provider: anthropic
      model: claude-haiku-4-5-20251001
      # Empty default so local/default profile starts without env; prod profile overrides with required key.
      api-key: ${ANTHROPIC_API_KEY:}
      max-tokens: 1000
  forecast:
    base-url: ${FORECAST_BASE_URL:http://forecast-service:8090}
    timeout-seconds: ${FORECAST_TIMEOUT_SECONDS:8}
    job-delay-ms: ${FORECAST_JOB_DELAY_MS:2000}
  documents:
    provider: ${DOCUMENTS_PROVIDER:s3}
    bucket: ${DOCUMENTS_BUCKET:smartaccounting-docs}
  copilot:
    agent:
      policy:
        action-requires-approval: ${COPILOT_AGENT_ACTION_REQUIRES_APPROVAL:true}
        default-dry-run: ${COPILOT_AGENT_DEFAULT_DRY_RUN:false}
        action-approval-ttl-seconds: ${COPILOT_AGENT_ACTION_APPROVAL_TTL_SECONDS:1800}
      execution:
        max-duration-seconds: ${COPILOT_AGENT_MAX_DURATION_SECONDS:45}
        max-steps: ${COPILOT_AGENT_MAX_STEPS:16}
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    topic-domain-events: ${KAFKA_TOPIC_DOMAIN_EVENTS:domain.events}
    topic-dlq-events: ${KAFKA_TOPIC_DLQ_EVENTS:domain.events.dlq}
  outbox:
    relay-delay-ms: ${OUTBOX_RELAY_DELAY_MS:1500}
    max-attempts: ${OUTBOX_MAX_ATTEMPTS:8}
  security:
    jwt-secret: ${JWT_SECRET:change-me-enterprise-secret-change-in-prod}
    jwt-secret-file: ${JWT_SECRET_FILE:}
    jwt-key-id: ${JWT_KEY_ID:smartaccounting-k1}
    jwt-legacy-secrets: ${JWT_LEGACY_SECRETS:}
    jwt-legacy-secrets-file: ${JWT_LEGACY_SECRETS_FILE:}
    jwt-expiration-minutes: ${JWT_EXP_MINUTES:120}
    refresh-expiration-days: ${REFRESH_EXP_DAYS:14}
    mfa:
      challenge-ttl-seconds: ${MFA_CHALLENGE_TTL_SECONDS:300}
      debug-return-code: ${MFA_DEBUG_RETURN_CODE:false}
  pos:
    default-inventory-location: ${POS_DEFAULT_LOCATION:SHOP}
    sale-sink-location: ${POS_SALE_SINK_LOCATION:SOLD}
    allow-negative-stock: ${POS_ALLOW_NEGATIVE_STOCK:false}
    business-time-zone: ${POS_BUSINESS_TIME_ZONE:Africa/Kigali}
  mobile-money:
    mtn-webhook-secret: ${MOBILE_MONEY_MTN_WEBHOOK_SECRET:}
    airtel-webhook-secret: ${MOBILE_MONEY_AIRTEL_WEBHOOK_SECRET:}
    webhook-actor-user-id: ${MOBILE_MONEY_WEBHOOK_USER_ID:00000000-0000-0000-0000-000000000001}
  sms:
    enabled: ${SMS_ENABLED:false}
    dry-run: ${SMS_DRY_RUN:true}
    route-by-network: ${SMS_ROUTE_BY_NETWORK:true}
    mtn-prefixes: ${SMS_MTN_PREFIXES:78,79}
    airtel-prefixes: ${SMS_AIRTEL_PREFIXES:72,73}
    provider-url: ${SMS_PROVIDER_URL:}
    bearer-token: ${SMS_BEARER_TOKEN:}
    sender-id: ${SMS_SENDER_ID:SMARTACCOUNTING}
    mtn:
      provider-url: ${SMS_MTN_PROVIDER_URL:}
      bearer-token: ${SMS_MTN_BEARER_TOKEN:}
      sender-id: ${SMS_MTN_SENDER_ID:}
    airtel:
      provider-url: ${SMS_AIRTEL_PROVIDER_URL:}
      bearer-token: ${SMS_AIRTEL_BEARER_TOKEN:}
      sender-id: ${SMS_AIRTEL_SENDER_ID:}
    connect-timeout-ms: ${SMS_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${SMS_READ_TIMEOUT_MS:10000}
  receipt:
    store-name: ${RECEIPT_STORE_NAME:SMARTACCOUNTING}
    store-address: ${RECEIPT_STORE_ADDRESS:}
    footer-text: ${RECEIPT_FOOTER_TEXT:Thank you.}
    printer-type: ${RECEIPT_PRINTER_TYPE:thermal}
  label:
    printer-type: ${LABEL_PRINTER_TYPE:thermal-label}
  public-signup:
    platform-admin-phone: ${PLATFORM_ADMIN_PHONE:}
    login-url-text: ${SIGNUP_LOGIN_URL_TEXT:smartaccounting.rw}
    otp-ttl-minutes: ${PUBLIC_SIGNUP_OTP_TTL_MINUTES:10}
    lock-minutes: ${PUBLIC_SIGNUP_LOCK_MINUTES:30}
    otp-max-failures: ${PUBLIC_SIGNUP_OTP_MAX_FAILURES:5}
  oauth:
    google-client-ids: ${OAUTH_GOOGLE_CLIENT_IDS:}
    microsoft-client-ids: ${OAUTH_MICROSOFT_CLIENT_IDS:}
  tenant-plans:
    max-users-by-plan:
      TRIAL: 5
      STARTER: 25
      PROFESSIONAL: 100
      ENTERPRISE: 500
      STANDARD: 1000
  rra:
    rwanda:
      enabled: ${RRA_RWANDA_ENABLED:false}
      base-url: ${RRA_RWANDA_BASE_URL:https://eis.api.rra.example.invalid}
      eis-submit-path: ${RRA_RWANDA_EIS_SUBMIT_PATH:/eis/v1/invoice}
      vat-return-submit-path: ${RRA_RWANDA_VAT_RETURN_PATH:/eis/v1/vat-return}
      api-token-environment-variable: ${RRA_RWANDA_TOKEN_ENV:RRA_EIS_API_TOKEN}
      vat-rate-percent: 18
      vat-mandatory-registration-turnover-rwf: 20000000
      vat-return-due-day-of-next-month: 15
      connect-timeout-ms: 15000
      read-timeout-ms: 60000
