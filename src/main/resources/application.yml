server:
  port: 8080

spring:
  application:
    name: smartchain-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smartchain}
    username: ${DB_USERNAME:smartchain}
    password: ${DB_PASSWORD:smartchain}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:30}
      minimum-idle: ${DB_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      properties:
        enable.idempotence: true
    consumer:
      group-id: ${KAFKA_GROUP_ID:smartchain-backend}
      auto-offset-reset: earliest
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        readiness:
          include: db,redis,rls,kafka,forecast
        liveness:
          include: ping
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "corr=%X{correlationId:-na} tenant=%X{tenantId:-na} user=%X{userId:-na} %5p"

smartchain:
  api:
    v1-deprecation-enabled: ${API_V1_DEPRECATION_ENABLED:false}
    v1-sunset: ${API_V1_SUNSET:Wed, 31 Dec 2026 23:59:59 GMT}
  forecast:
    base-url: ${FORECAST_BASE_URL:http://forecast-service:8090}
    timeout-seconds: ${FORECAST_TIMEOUT_SECONDS:8}
    job-delay-ms: ${FORECAST_JOB_DELAY_MS:2000}
  documents:
    provider: ${DOCUMENTS_PROVIDER:s3}
    bucket: ${DOCUMENTS_BUCKET:smartchain-docs}
  copilot:
    agent:
      policy:
        action-requires-approval: ${COPILOT_AGENT_ACTION_REQUIRES_APPROVAL:true}
        default-dry-run: ${COPILOT_AGENT_DEFAULT_DRY_RUN:false}
        action-approval-ttl-seconds: ${COPILOT_AGENT_ACTION_APPROVAL_TTL_SECONDS:1800}
      execution:
        max-duration-seconds: ${COPILOT_AGENT_MAX_DURATION_SECONDS:45}
        max-steps: ${COPILOT_AGENT_MAX_STEPS:16}
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    topic-domain-events: ${KAFKA_TOPIC_DOMAIN_EVENTS:domain.events}
    topic-dlq-events: ${KAFKA_TOPIC_DLQ_EVENTS:domain.events.dlq}
  outbox:
    relay-delay-ms: ${OUTBOX_RELAY_DELAY_MS:1500}
    max-attempts: ${OUTBOX_MAX_ATTEMPTS:8}
  security:
    jwt-secret: ${JWT_SECRET:change-me-enterprise-secret-change-in-prod}
    jwt-secret-file: ${JWT_SECRET_FILE:}
    jwt-key-id: ${JWT_KEY_ID:smartchain-k1}
    jwt-legacy-secrets: ${JWT_LEGACY_SECRETS:}
    jwt-legacy-secrets-file: ${JWT_LEGACY_SECRETS_FILE:}
    jwt-expiration-minutes: ${JWT_EXP_MINUTES:120}
    refresh-expiration-days: ${REFRESH_EXP_DAYS:14}
    mfa:
      challenge-ttl-seconds: ${MFA_CHALLENGE_TTL_SECONDS:300}
      debug-return-code: ${MFA_DEBUG_RETURN_CODE:false}
