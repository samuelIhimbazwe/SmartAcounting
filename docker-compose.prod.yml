# Production-style local stack: Postgres + Redis + API + static web (nginx).
# Usage:
#   cp .env.production.example .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
# Web: http://localhost  API: http://localhost/api/actuator/health/readiness

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-smartchain}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.production}
      POSTGRES_DB: ${DB_NAME:-smartchain}
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c wal_level=replica
      -c archive_mode=on
      -c log_min_duration_statement=1000
      -c log_connections=on
    volumes:
      - smartchain-pgdata-prod:/var/lib/postgresql/data
      - ./docker/postgres/init-01-vector.sql:/docker-entrypoint-initdb.d/01-vector.sql
      - ./scripts/backup-prod.sh:/scripts/backup-prod.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-smartchain} -d ${DB_NAME:-smartchain}']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - smartchain-redis-prod:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-smartchain}
      DB_USERNAME: ${DB_USERNAME:-smartchain}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_KEY_ID: ${JWT_KEY_ID:-smartaccounting-k1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SMARTACCOUNTING_AI_FAIL_ON_MISSING_PROVIDER_KEYS: ${SMARTACCOUNTING_AI_FAIL_ON_MISSING_PROVIDER_KEYS:-true}
      MOBILE_MONEY_MTN_WEBHOOK_SECRET: ${MOBILE_MONEY_MTN_WEBHOOK_SECRET:-}
      MOBILE_MONEY_AIRTEL_WEBHOOK_SECRET: ${MOBILE_MONEY_AIRTEL_WEBHOOK_SECRET:-}
      MOMO_ALLOWED_IPS: ${MOMO_ALLOWED_IPS:-}
      SMS_ENABLED: ${SMS_ENABLED:-false}
      SMS_PROVIDER_URL: ${SMS_PROVIDER_URL:-}
      SMS_BEARER_TOKEN: ${SMS_BEARER_TOKEN:-}
      SMS_SENDER_ID: ${SMS_SENDER_ID:-SmartAccounting}
      FORECAST_BASE_URL: ${FORECAST_BASE_URL:-http://forecast-service:8090}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      SMARTACCOUNTING_OAUTH2_REDIRECT_URI: ${SMARTACCOUNTING_OAUTH2_REDIRECT_URI:-http://localhost/auth/oauth2/callback}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/actuator/health/readiness || exit 1']
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 120s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
      - "${WEB_TLS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy

  certbot:
    build:
      context: ./deploy/certbot
    profiles: ["tls"]
    volumes:
      - certbot-www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"

volumes:
  smartchain-pgdata-prod:
  smartchain-redis-prod:
  certbot-www:
  letsencrypt:
