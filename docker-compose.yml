# Local dev: Postgres (with pgvector) + Redis — Postgres on host port 5433 (see application.yml).
# Usage: docker compose up -d
# Then: .\gradlew.bat bootRun  (optional: --args="--spring.profiles.active=dev" for placeholder AI)

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: smartchain
      POSTGRES_PASSWORD: smartchain
      POSTGRES_DB: smartchain
    ports:
      # Host 5433 avoids clashing with a local PostgreSQL on 5432; matches application.yml default.
      - "5433:5432"
    volumes:
      - smartchain-pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-01-vector.sql:/docker-entrypoint-initdb.d/01-vector.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smartchain -d smartchain']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  smartchain-pgdata:
