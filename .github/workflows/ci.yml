name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: smartaccounting_test
          POSTGRES_USER: sa
          POSTGRES_PASSWORD: sa
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Compile and unit test
        run: ./gradlew compileJava test dependencyCheckAnalyze --no-daemon
      - name: Integration tests
        run: ./gradlew integrationTest --no-daemon
        env:
          RUN_PG_TESTS: 'true'
          DB_URL: jdbc:postgresql://localhost:5432/smartaccounting_test
          DB_USERNAME: sa
          DB_PASSWORD: sa
      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: build/reports/tests/

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: i18n drift check
        run: node scripts/i18n-drift-check.mjs
      - run: npm run lint
        continue-on-error: true

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartchain-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: smartchain-mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npm run test:coverage
      - name: i18n completeness check
        run: node scripts/i18n-drift-check.mjs

  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: smartchain-desktop/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Verify desktop shell
        run: npm ci && npm run verify
        working-directory: smartchain-desktop

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: smartaccounting-api:ci
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: smartaccounting-web:ci

  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production host
        env:
          HOST: ${{ secrets.HOST }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          if [ -z "$HOST" ] || [ -z "$SSH_KEY" ] || [ -z "$DEPLOY_USER" ]; then
            echo "Skipping deploy — set HOST, SSH_KEY, and DEPLOY_USER repository secrets."
            exit 0
          fi
          install -m 600 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key \
            "${DEPLOY_USER}@${HOST}" \
            'cd /opt/smartaccounting && docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d'
